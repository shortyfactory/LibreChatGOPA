version: '3.8'

services:
  vectordb:
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - pgdata2:/var/lib/postgresql/data
    ports:
      - '5433:5432'

  rag_api:
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev:latest
    environment:
      - DB_HOST=vectordb
      - DB_PORT=5432
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER:-azure}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL:-text-embedding-3-large}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY_SWEDEN}
      - AZURE_OPENAI_ENDPOINT=https://${AZURE_OPENAI_INSTANCE_NAME}.openai.azure.com
      - RAG_AZURE_OPENAI_API_VERSION=${RAG_AZURE_OPENAI_API_VERSION:-2024-05-01-preview}
    ports:
      - '${RAG_PORT}:${RAG_PORT}'
    depends_on:
      - vectordb
    env_file:
      - .env

volumes:
  pgdata2:
